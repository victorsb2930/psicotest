services:
  # Servicio de la aplicación Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    volumes:
      # Montamos el proyecto en el contenedor para desarrollo.
      # Nota: `vendor` se monta en un volumen nombrado separado (`vendor_data`) para
      # evitar que un bind-mount local vacío sobrescriba las dependencias instaladas
      # dentro de la imagen. Esto protege `vendor/autoload.php` frente a borrados
      # accidentales en el host.
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    working_dir: /var/www/html
    depends_on:
      - db
      - redis
      - reverb
    # Comprobación ligera: falla el servicio si falta el autoload de Composer.
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Servicio web (Nginx)
  web:
    image: nginx:alpine
    container_name: laravel-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  # Servicio de la base de datos (PostgreSQL)
  db:
    image: postgres:14-alpine
    container_name: laravel-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Servicio de Redis
  redis:
    image: redis:alpine
    container_name: laravel-redis
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - vendor_data:/var/www/html/vendor
    depends_on:
      - redis
    ports:
      - "8081:8081"
    # Healthcheck para reverb, evita que salga healthy si faltan dependencias PHP
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Servicio Adminer (UI para base de datos)
  adminer:
    image: adminer:latest
    container_name: laravel-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Servicio MailHog (captura correos en desarrollo)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: laravel-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      - MH_STORAGE=maildir
    volumes:
      - mailhog_data:/maildir
    # No depende de otros servicios explícitamente; ningún otro servicio debe esperar a que MailHog arranque

  # Signaling server for native WebRTC (Socket.IO)
  signaling:
    build:
      context: ./server/signaling
      dockerfile: Dockerfile
    container_name: PsicoTest-signaling
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./server/signaling:/usr/src/app:cached
    environment:
      - NODE_ENV=production

volumes:
  pg_data:
    name: PsicoTest_pg_data
  vendor_data:
    name: PsicoTest_vendor_data
  mailhog_data:
    name: PsicoTest_mailhog_data
